<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>賦格</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background-color: #f3e7d3;
      color: #3b3023;
      font-family: "Times New Roman", "Yu Mincho", "Hiragino Mincho ProN", serif;
    }

    .top-page {
      position: relative;
      width: min(100vw, 114.9402vh);
      aspect-ratio: 577 / 502;
      overflow: hidden;
      container-type: inline-size;
      background-image: url("top-background.png");
      background-repeat: no-repeat;
      background-position: center top;
      background-size: 100% 100%;
    }

    .top-copy {
      position: absolute;
      top: 45%;
      left: 13%;
      width: 74%;
      padding: clamp(6px, 1.4cqw, 16px) clamp(8px, 1.9cqw, 22px);
      border: 1px solid rgba(111, 80, 48, 0.24);
      background-color: rgba(255, 251, 241, 0.64);
      box-shadow: 0 3px 12px rgba(76, 50, 27, 0.10);
      transform: translateY(-50%);
      text-shadow: 0 1px 0 rgba(255, 255, 255, 0.9);
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(13px, 2.4cqw, 28px);
      letter-spacing: 0;
    }

    p {
      margin: 0;
      font-size: clamp(7px, 1.3cqw, 15px);
      line-height: 1.7;
    }

    .date {
      white-space: nowrap;
    }
  </style>
</head>

<body>
  <main class="top-page">
    <section class="top-copy">
      <h1>賦格のホームページ</h1>

      <p>
        現在工事中<br>
        ≪進捗≫<br>
        <span class="date">-2026/06/19-</span>
        ホームページを改修。ブログ更新、旧ブログhtmをエッセイに移行。SNShtmを作成。<br>
        <span class="date">-2026/06/01-</span>
        デザインなどをアップデート。PCとスマホの表示調整を開始。<br>
        <span class="date">-2026/05/31-</span>
        とりあえず、ホームページを作成。
      </p>
    </section>
  </main>
</body>
</html>
