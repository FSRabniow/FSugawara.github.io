<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>YouTube | Fuga Sugawara</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
      padding: 32px 16px;
      background: #f5ead8 url("paper-background.png") center / cover no-repeat fixed;
      color: #000000;
      font-family: "Times New Roman", "Yu Mincho", "MS Mincho", serif;
    }

    main {
      width: min(700px, 100%);
      margin: 0 auto;
    }

    h1 {
      margin: 0 0 22px;
      font-size: 27px;
      letter-spacing: 0;
    }

    a {
      color: #0000ee;
      font-size: 18px;
      font-weight: bold;
    }

    a:visited {
      color: #551a8b;
    }

    a:hover {
      color: #cc0000;
    }

    @media (max-width: 560px) {
      body {
        padding: 20px 12px;
      }

      h1 {
        font-size: 23px;
      }

      a {
        font-size: 16px;
      }
    }
  </style>
</head>

<body>
  <main>
    <h1>YouTube</h1>
    <a href="https://www.youtube.com/channel/UCpLe9QyES5yOrpHvV1GCfbQ"
       target="_blank"
       rel="noopener noreferrer">YouTubeチャンネル</a>
