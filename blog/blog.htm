<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Blog | Fuga Sugawara</title>
  <style>
    :root {
      --bg: #f7f1e3;
      --paper: #fffaf0;
      --ink: #2b2118;
      --muted: #6f6257;
      --line: #d8c7ad;
      --accent: #7a3e2e;
      --accent-soft: #efe0cf;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(122, 62, 46, 0.08), transparent 30%),
        var(--bg);
      font-family: "Times New Roman", "Yu Mincho", "Hiragino Mincho ProN", "Noto Serif JP", serif;
      line-height: 1.75;
    }

    a {
      color: var(--accent);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .page {
      width: min(920px, calc(100% - 32px));
      margin: 32px auto;
      padding: 28px;
      background: var(--paper);
      border: 1px solid var(--line);
      box-shadow: 0 10px 30px rgba(43, 33, 24, 0.12);
    }

    header {
      border-bottom: 2px double var(--line);
      padding-bottom: 18px;
      margin-bottom: 24px;
    }

    .site-title {
      margin: 0;
      font-size: clamp(2rem, 5vw, 3.4rem);
      line-height: 1.1;
      letter-spacing: 0.04em;
    }

    .subtitle {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 0.98rem;
    }

    nav {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 18px;
      font-size: 0.95rem;
    }

    nav a {
      padding: 4px 10px;
      border: 1px solid var(--line);
      background: #fffdf8;
    }

    .intro {
      margin: 0 0 24px;
      padding: 14px 16px;
      border-left: 4px solid var(--accent);
      background: var(--accent-soft);
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
      margin: 22px 0;
    }

    .search-box {
      flex: 1 1 260px;
    }

    input[type="search"] {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--line);
      background: #fffdf8;
      color: var(--ink);
      font-family: inherit;
      font-size: 1rem;
    }

    .status {
      color: var(--muted);
      font-size: 0.92rem;
    }

    .post-list {
      display: grid;
      gap: 14px;
      margin-top: 16px;
    }

    .post-card {
      padding: 18px;
      border: 1px solid var(--line);
      background: #fffdf8;
    }

    .post-card time {
      display: inline-block;
      margin-bottom: 6px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .post-card h2 {
      margin: 0 0 8px;
      font-size: 1.35rem;
      line-height: 1.35;
    }

    .post-card p {
      margin: 0;
      color: var(--muted);
    }

    .category {
      display: inline-block;
      margin-top: 10px;
      padding: 2px 8px;
      border: 1px solid var(--line);
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 0.85rem;
    }

    .empty {
      padding: 18px;
      border: 1px dashed var(--line);
      color: var(--muted);
      background: #fffdf8;
    }

    footer {
      margin-top: 32px;
      padding-top: 16px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 0.9rem;
    }

    @media (max-width: 640px) {
      .page {
        width: min(100% - 20px, 920px);
        margin: 10px auto;
        padding: 18px;
      }

      nav a {
        flex: 1 1 auto;
        text-align: center;
      }

      .post-card {
        padding: 14px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header>
      <h1 class="site-title">Blog</h1>
      <p class="subtitle">Notes from Taiwan, research, technology, and everyday life.</p>

      <nav aria-label="Main navigation">
        <a href="../index.html" target="_top">Home</a>
        <a href="../top.htm" target="_top">Top</a>
        <a href="./blog.htm" aria-current="page">Blog</a>
      </nav>
    </header>

    <section class="intro">
      <strong>Fuga Sugawara's Blog</strong><br>
      台南での生活、研究メモ、技術メモ、日々の記録をまとめています。
    </section>

    <section class="toolbar" aria-label="Blog tools">
      <div class="search-box">
        <input id="searchInput" type="search" placeholder="記事を検索..." aria-label="記事を検索">
      </div>
      <div id="status" class="status">Loading posts...</div>
    </section>

    <section id="postList" class="post-list" aria-live="polite"></section>

    <footer>
      <p>© Fuga Sugawara. Built with GitHub Pages.</p>
    </footer>
  </main>

  <script>
    /*
      Blog loading policy:
      1. Try to read ../posts.json first.
      2. If posts.json does not exist or cannot be read, use manualPosts below.
      3. This avoids dependency on Google Apps Script and makes the blog stable on GitHub Pages.
    */

    const manualPosts = [
      {
        title: "Dong'an Market",
        date: "2026-04-29",
        category: "Tainan Life",
        description: "A short note about Dong'an Market and daily life in Tainan.",
        url: "../posts/2026-04-29-dongan-market.html"
      },
      {
        title: "Tainan First Note",
        date: "2026-04-29",
        category: "Tainan Life",
        description: "The first note from Tainan.",
        url: "../posts/2026-04-29-tainan-first-note.html"
      }
    ];

    const postList = document.getElementById("postList");
    const statusEl = document.getElementById("status");
    const searchInput = document.getElementById("searchInput");

    let allPosts = [];

    function normalizePost(post) {
      return {
        title: post.title || "Untitled",
        date: post.date || "",
        category: post.category || "Uncategorized",
        description: post.description || post.summary || "",
        url: post.url || "#"
      };
    }

    function sortPosts(posts) {
      return posts.slice().sort((a, b) => {
        return String(b.date).localeCompare(String(a.date));
      });
    }

    function renderPosts(posts) {
      postList.innerHTML = "";

      if (!posts.length) {
        postList.innerHTML = '<div class="empty">該当する記事がありません。</div>';
        statusEl.textContent = "0 posts";
        return;
      }

      const fragment = document.createDocumentFragment();

      posts.forEach(post => {
        const article = document.createElement("article");
        article.className = "post-card";

        const date = document.createElement("time");
        date.textContent = post.date || "No date";
        if (post.date) {
          date.setAttribute("datetime", post.date);
        }

        const title = document.createElement("h2");
        const link = document.createElement("a");
        link.href = post.url;
        link.textContent = post.title;
        title.appendChild(link);

        const description = document.createElement("p");
        description.textContent = post.description || "";

        const category = document.createElement("span");
        category.className = "category";
        category.textContent = post.category;

        article.appendChild(date);
        article.appendChild(title);

        if (post.description) {
          article.appendChild(description);
        }

        article.appendChild(category);
        fragment.appendChild(article);
      });

      postList.appendChild(fragment);
      statusEl.textContent = posts.length + (posts.length === 1 ? " post" : " posts");
    }

    function filterPosts(keyword) {
      const q = keyword.trim().toLowerCase();

      if (!q) {
        renderPosts(allPosts);
        return;
      }

      const filtered = allPosts.filter(post => {
        return [
          post.title,
          post.date,
          post.category,
          post.description
        ].join(" ").toLowerCase().includes(q);
      });

      renderPosts(filtered);
    }

    async function loadPosts() {
      try {
        const response = await fetch("../posts.json", { cache: "no-store" });

        if (!response.ok) {
          throw new Error("posts.json not found");
        }

        const data = await response.json();

        if (!Array.isArray(data)) {
          throw new Error("posts.json must be an array");
        }

        allPosts = sortPosts(data.map(normalizePost));
        renderPosts(allPosts);
      } catch (error) {
        console.warn("Using manual post list:", error);
        allPosts = sortPosts(manualPosts.map(normalizePost));
        renderPosts(allPosts);
        statusEl.textContent = allPosts.length + " posts / fallback mode";
      }
    }

    searchInput.addEventListener("input", event => {
      filterPosts(event.target.value);
    });

    loadPosts();
  </script>
</body>
</html>
