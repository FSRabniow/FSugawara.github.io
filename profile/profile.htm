<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>臺南小誌by賦格</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
    }

    body {
      min-height: 100vh;
      margin: 0;
      color: #3b3023;
      font-family: "Times New Roman", "Yu Mincho", "Hiragino Mincho ProN", serif;
      background-color: #f5ead8;
      background-image: url("paper-background.png");
      background-repeat: no-repeat;
      background-position: center center;
      background-size: cover;
      background-attachment: fixed;
    }

    .profile-page {
      width: min(880px, calc(100% - 32px));
      margin: 0 auto;
      padding: 38px 0;
    }

    h1 {
      margin: 0 0 22px;
      font-size: 30px;
      letter-spacing: 0;
    }

    .profile-content {
      display: grid;
      grid-template-columns: minmax(220px, 300px) minmax(0, 1fr);
      gap: 28px;
      align-items: start;
      padding: 24px;
      border: 1px solid rgba(108, 78, 47, 0.30);
      background-color: rgba(255, 252, 244, 0.70);
      box-shadow: 0 4px 16px rgba(70, 48, 28, 0.12);
    }

    .profile-photo {
      display: block;
      width: 100%;
      max-width: 300px;
      height: auto;
      border: 1px solid rgba(108, 78, 47, 0.30);
    }

    .profile-text {
      margin: 0;
      font-size: 16px;
      line-height: 1.9;
    }

    @media (max-width: 680px) {
      .profile-page {
        width: min(100% - 20px, 520px);
        padding: 20px 0;
      }

      h1 {
        margin-bottom: 14px;
        font-size: 25px;
      }

      .profile-content {
        grid-template-columns: 1fr;
        gap: 18px;
        padding: 16px;
      }

      .profile-photo {
        width: min(100%, 300px);
        margin: 0 auto;
      }

      .profile-text {
        font-size: 15px;
        line-height: 1.8;
      }
    }
  </style>
</head>

<body>
  <main class="profile-page">
    <h1>自己紹介</h1>

    <section class="profile-content">
      <img class="profile-photo" src="profile.jpg" alt="賦格のプロフィール写真">

      <p class="profile-text">
        岩手県の田舎で育ちました。今は、台南で二つ目の修士号取得を目指して大学院生活を送っています。<br>
        以前はデータベースを専門とするエンジニアとして働いていました。<br>
        本ブログでは、台南での生活を中心に、見たこと、感じたこと、たまにどうでもいいことを徒然なるままに書いていきます。
      </p>
    </section>
  </main>
</body>
</html>
