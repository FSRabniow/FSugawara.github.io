<!DOCTYPE html>
<html lang="ja"><head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>つぶやき | Fuga Sugawara</title>

  <style>
    * { box-sizing: border-box; }
    [hidden] { display: none !important; }

    html { min-height: 100%; }

    body {
      min-height: 100vh;
      margin: 0;
      padding: 32px 16px;
      background: #f5ead8 url("paper-background.png") center / cover no-repeat fixed;
      color: #2f281f;
      font-family: "Times New Roman", "Yu Mincho", "MS Mincho", serif;
      font-size: 16px;
      line-height: 1.75;
    }

    main {
      width: min(700px, 100%);
      margin: 0 auto;
    }

    h1 {
      margin: 0 0 24px;
      font-size: 28px;
      letter-spacing: 0;
    }

    .tweet {
      padding: 14px 4px;
      border-bottom: 1px solid rgba(93, 81, 66, 0.38);
    }

    .tweet:first-child {
      border-top: 1px solid rgba(93, 81, 66, 0.38);
    }

    .tweet-time {
      margin: 0 0 5px;
      color: #6a5b48;
      font-size: 13px;
    }

    .tweet-text {
      margin: 0;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .empty {
      color: #6a5b48;
    }

    .editor {
      margin-bottom: 30px;
      padding: 16px;
      border: 1px solid rgba(93, 81, 66, 0.55);
      background: rgba(255, 252, 244, 0.78);
    }

    .edit-access {
      margin-top: 24px;
      text-align: right;
    }

    .edit-access > button {
      border: 0;
      background: transparent;
      color: #6a5b48;
      font-size: 12px;
      text-decoration: underline;
    }

    .login-panel {
      width: min(320px, 100%);
      margin: 8px 0 0 auto;
      padding: 12px;
      border: 1px solid rgba(93, 81, 66, 0.45);
      background: rgba(255, 252, 244, 0.82);
      text-align: left;
    }

    .login-panel input {
      margin-bottom: 8px;
    }

    .login-status {
      min-height: 1.5em;
      margin: 2px 0 0;
      color: #b00020;
      font-size: 12px;
    }

    .editor h2 {
      margin: 0 0 14px;
      font-size: 20px;
    }

    label {
      display: block;
      margin-bottom: 4px;
      font-weight: bold;
    }

    input,
    textarea {
      width: 100%;
      margin-bottom: 12px;
      border: 1px solid #80715e;
      background: rgba(255, 255, 255, 0.84);
      color: #000;
      font: inherit;
    }

    input { padding: 7px; }

    textarea {
      min-height: 110px;
      padding: 8px;
      resize: vertical;
    }

    button {
      margin: 0 7px 7px 0;
      padding: 7px 12px;
      border: 1px solid #625542;
      border-radius: 3px;
      background: #eee2ce;
      color: #241e17;
      font: inherit;
      cursor: pointer;
    }

    button:hover { background: #e2d2b8; }

    .primary {
      background: #dce6d8;
      font-weight: bold;
    }

    .status {
      min-height: 1.5em;
      margin: 5px 0 0;
      color: #52654b;
      font-size: 13px;
    }

    .github-publish {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid rgba(93, 81, 66, 0.38);
    }

    .github-publish p {
      margin: 0 0 8px;
      color: #6a5b48;
      font-size: 12px;
    }

    .edit-item {
      position: relative;
      padding-right: 70px;
    }

    .delete-button {
      position: absolute;
      top: 10px;
      right: 0;
      margin: 0;
      padding: 3px 8px;
      font-size: 12px;
    }

    @media (max-width: 560px) {
      body { padding: 20px 12px; }
      h1 { font-size: 24px; }
      .tweet { padding: 12px 2px; }
      .editor { padding: 12px; }
      .editor > button,
      .login-panel > button {
        width: 100%;
        margin-right: 0;
      }
    }
  </style>
</head>

<body marginwidth="0" marginheight="0">
  <main>
    <h1>つぶやき</h1>

    <section class="editor" id="editor" hidden="">
      <h2>つぶやき入力</h2>

      <label for="tweet-datetime">日時</label>
      <input id="tweet-datetime" type="datetime-local">

      <label for="tweet-input">本文</label>
      <textarea id="tweet-input" maxlength="1000"></textarea>

      <button class="primary" id="add-button" type="button">追加</button>
      <button id="download-button" type="button">更新版tweet.htmを作成</button>
      <button id="lock-button" type="button">編集を閉じる</button>

      <div class="github-publish">
        <label for="github-token">GitHubトークン</label>
        <input id="github-token" type="password" autocomplete="off">
        <p>トークンは保存されません。</p>
        <button class="primary" id="publish-button" type="button">GitHubへ直接公開</button>
      </div>

      <p class="status" id="status" aria-live="polite" style="color: rgb(82, 101, 75);"></p>
    </section>

    <div id="tweet-list"></div>

    <div class="edit-access" id="edit-access">
      <button id="show-login-button" type="button">編集</button>
      <div class="login-panel" id="login-panel" hidden="">
        <label for="password-input">パスワード</label>
        <input id="password-input" type="password" inputmode="numeric" autocomplete="current-password">
        <button id="unlock-button" type="button">編集欄を開く</button>
        <p class="login-status" id="login-status" aria-live="polite"></p>
      </div>
    </div>
  </main>

  <script id="tweet-data" type="application/json">[]</script>
  <script>
    const PASSWORD_HASH = "d2c5ea6c63da5897cbd7a3146e762162b2528dd79fe4fcef0bcfeb86d7136dbe";
    const STORAGE_KEY = "fuga-tweet-items-v1";
    const DRAFT_KEY = "fuga-tweet-draft-v1";
    const GITHUB_OWNER = "FSRabniow";
    const GITHUB_REPO = "FSugawara.github.io";
    const GITHUB_BRANCH = "main";
    const dataElement = document.getElementById("tweet-data");
    const list = document.getElementById("tweet-list");
    const editor = document.getElementById("editor");
    const editAccess = document.getElementById("edit-access");
    const loginPanel = document.getElementById("login-panel");
    const passwordInput = document.getElementById("password-input");
    const loginStatus = document.getElementById("login-status");
    const datetimeInput = document.getElementById("tweet-datetime");
    const textInput = document.getElementById("tweet-input");
    const status = document.getElementById("status");
    const githubTokenInput = document.getElementById("github-token");
    let editMode = false;
    const localTweets = readLocalTweets();
    let tweets = localTweets === null ? readTweets() : localTweets;

    editor.hidden = true;

    if (new URLSearchParams(location.search).get("edit") === "1" || location.hash === "#edit") {
      loginPanel.hidden = false;
      passwordInput.focus();
    }

    renderTweets();

    datetimeInput.addEventListener("input", saveDraft);
    textInput.addEventListener("input", saveDraft);

    document.getElementById("show-login-button").addEventListener("click", function () {
      loginPanel.hidden = !loginPanel.hidden;
      loginStatus.textContent = "";
      if (!loginPanel.hidden) passwordInput.focus();
    });

    document.getElementById("unlock-button").addEventListener("click", unlockEditor);

    passwordInput.addEventListener("keydown", function (event) {
      if (event.key === "Enter") unlockEditor();
    });

    document.getElementById("lock-button").addEventListener("click", function () {
      editMode = false;
      editor.hidden = true;
      editAccess.hidden = false;
      passwordInput.value = "";
      renderTweets();
    });

    document.getElementById("add-button").addEventListener("click", function () {
      const text = textInput.value.trim();

      if (!text) {
        setStatus("本文を入力してください。", true);
        return;
      }

      tweets.push({
        id: Date.now().toString(36) + Math.random().toString(36).slice(2, 7),
        datetime: datetimeInput.value || toLocalInputValue(new Date()),
        text: text
      });

      saveLocalTweets();
      textInput.value = "";
      datetimeInput.value = toLocalInputValue(new Date());
      clearDraft();
      renderTweets();
      setStatus("追加しました。更新版を作成するとHTMLへ保存されます。");
    });

    document.getElementById("download-button").addEventListener("click", function () {
      const html = buildUpdatedHtml();
      const blob = new Blob([html], { type: "text/html;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");

      link.href = url;
      link.download = "tweet.htm";
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
      setStatus("全" + tweets.length + "件を含むtweet.htmを作成しました。");
    });

    document.getElementById("publish-button").addEventListener("click", publishToGitHub);

    async function publishToGitHub() {
      const token = githubTokenInput.value.trim();
      if (!token) {
        setStatus("GitHubトークンを入力してください。", true);
        return;
      }

      const button = document.getElementById("publish-button");
      button.disabled = true;
      setStatus("GitHubへ公開しています...");

      try {
        const filePath = getRepositoryFilePath();
        const apiUrl = "https://api.github.com/repos/" +
          encodeURIComponent(GITHUB_OWNER) + "/" +
          encodeURIComponent(GITHUB_REPO) + "/contents/" +
          filePath.split("/").map(encodeURIComponent).join("/");

        const headers = {
          "Accept": "application/vnd.github+json",
          "Authorization": "Bearer " + token
        };

        const currentResponse = await fetch(apiUrl + "?ref=" + encodeURIComponent(GITHUB_BRANCH), {
          headers: headers,
          cache: "no-store"
        });

        if (!currentResponse.ok) {
          throw new Error(await getGitHubError(currentResponse));
        }

        const currentFile = await currentResponse.json();
        const updateResponse = await fetch(apiUrl, {
          method: "PUT",
          headers: Object.assign({ "Content-Type": "application/json" }, headers),
          body: JSON.stringify({
            message: "Update tweets",
            content: utf8ToBase64(buildUpdatedHtml()),
            sha: currentFile.sha,
            branch: GITHUB_BRANCH
          })
        });

        if (!updateResponse.ok) {
          throw new Error(await getGitHubError(updateResponse));
        }

        githubTokenInput.value = "";
        saveLocalTweets();
        setStatus("公開しました。GitHub Pagesへの反映まで少し待ってください。");
      } catch (error) {
        setStatus("公開できませんでした: " + error.message, true);
      } finally {
        button.disabled = false;
      }
    }

    function buildUpdatedHtml() {
      const clone = document.documentElement.cloneNode(true);
      const cloneData = clone.querySelector("#tweet-data");
      const cloneList = clone.querySelector("#tweet-list");
      const cloneStatus = clone.querySelector("#status");
      const cloneDatetime = clone.querySelector("#tweet-datetime");
      const cloneInput = clone.querySelector("#tweet-input");
      const cloneEditor = clone.querySelector("#editor");
      const cloneEditAccess = clone.querySelector("#edit-access");
      const cloneLoginPanel = clone.querySelector("#login-panel");
      const cloneLoginStatus = clone.querySelector("#login-status");
      const clonePassword = clone.querySelector("#password-input");
      const cloneToken = clone.querySelector("#github-token");
      const clonePublishButton = clone.querySelector("#publish-button");

      cloneData.textContent = safeJson(tweets);
      cloneList.innerHTML = "";
      cloneStatus.textContent = "";
      cloneDatetime.removeAttribute("value");
      cloneInput.textContent = "";
      cloneEditor.setAttribute("hidden", "");
      cloneEditAccess.removeAttribute("hidden");
      cloneLoginPanel.setAttribute("hidden", "");
      cloneLoginStatus.textContent = "";
      clonePassword.removeAttribute("value");
      cloneToken.removeAttribute("value");
      clonePublishButton.removeAttribute("disabled");

      return "<!DOCTYPE html>\n" + clone.outerHTML;
    }

    function getRepositoryFilePath() {
      const parts = decodeURIComponent(location.pathname).split("/").filter(Boolean);
      const repoIndex = parts.findIndex(function (part) {
        return part.toLowerCase() === GITHUB_REPO.toLowerCase();
      });

      if (repoIndex >= 0 && parts.length > repoIndex + 1) {
        return parts.slice(repoIndex + 1).join("/");
      }

      return "tweet.htm";
    }

    function utf8ToBase64(text) {
      const bytes = new TextEncoder().encode(text);
      let binary = "";
      const chunkSize = 0x8000;

      for (let i = 0; i < bytes.length; i += chunkSize) {
        binary += String.fromCharCode.apply(null, bytes.subarray(i, i + chunkSize));
      }

      return btoa(binary);
    }

    async function getGitHubError(response) {
      try {
        const data = await response.json();
        return data.message || ("HTTP " + response.status);
      } catch (error) {
        return "HTTP " + response.status;
      }
    }

    async function unlockEditor() {
      loginStatus.textContent = "";

      try {
        const inputHash = await sha256(passwordInput.value);
        if (inputHash !== PASSWORD_HASH) {
          loginStatus.textContent = "パスワードが違います。";
          passwordInput.select();
          return;
        }

        editMode = true;
        editor.hidden = false;
        editAccess.hidden = true;
        restoreDraft();
        passwordInput.value = "";
        renderTweets();
        textInput.focus();
      } catch (error) {
        loginStatus.textContent = "このブラウザでは認証機能を利用できません。";
      }
    }

    async function sha256(value) {
      const bytes = new TextEncoder().encode(value);
      const digest = await crypto.subtle.digest("SHA-256", bytes);
      return Array.from(new Uint8Array(digest))
        .map(function (byte) { return byte.toString(16).padStart(2, "0"); })
        .join("");
    }

    function readTweets() {
      try {
        const parsed = JSON.parse(dataElement.textContent);
        return Array.isArray(parsed) ? parsed : [];
      } catch (error) {
        return [];
      }
    }

    function readLocalTweets() {
      try {
        const stored = localStorage.getItem(STORAGE_KEY);
        if (stored === null) return null;
        const parsed = JSON.parse(stored);
        return Array.isArray(parsed) ? parsed : null;
      } catch (error) {
        return null;
      }
    }

    function saveLocalTweets() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(tweets));
      } catch (error) {
        // 保存できない環境でも、開いている間は編集できる。
      }
    }

    function saveDraft() {
      try {
        localStorage.setItem(DRAFT_KEY, JSON.stringify({
          datetime: datetimeInput.value,
          text: textInput.value
        }));
      } catch (error) {
        // 保存できない環境では何もしない。
      }
    }

    function restoreDraft() {
      try {
        const draft = JSON.parse(localStorage.getItem(DRAFT_KEY));
        datetimeInput.value = draft && draft.datetime ? draft.datetime : toLocalInputValue(new Date());
        textInput.value = draft && draft.text ? draft.text : "";
      } catch (error) {
        datetimeInput.value = toLocalInputValue(new Date());
        textInput.value = "";
      }
    }

    function clearDraft() {
      try {
        localStorage.removeItem(DRAFT_KEY);
      } catch (error) {
        // 保存できない環境では何もしない。
      }
    }

    function renderTweets() {
      list.innerHTML = "";

      if (tweets.length === 0) {
        list.innerHTML = '<p class="empty">まだつぶやきはありません。</p>';
        return;
      }

      tweets
        .slice()
        .sort(function (a, b) {
          return String(b.datetime).localeCompare(String(a.datetime));
        })
        .forEach(function (tweet) {
          const article = document.createElement("article");
          article.className = "tweet" + (editMode ? " edit-item" : "");

          const time = document.createElement("p");
          time.className = "tweet-time";
          time.textContent = formatDate(tweet.datetime);

          const text = document.createElement("p");
          text.className = "tweet-text";
          text.textContent = tweet.text || "";

          article.appendChild(time);
          article.appendChild(text);

          if (editMode) {
            const button = document.createElement("button");
            button.type = "button";
            button.className = "delete-button";
            button.textContent = "削除";
            button.addEventListener("click", function () {
              tweets = tweets.filter(function (item) { return item.id !== tweet.id; });
              saveLocalTweets();
              renderTweets();
              setStatus("削除しました。更新版を作成すると反映されます。");
            });
            article.appendChild(button);
          }

          list.appendChild(article);
        });
    }

    function formatDate(value) {
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return value || "";

      return new Intl.DateTimeFormat("ja-JP", {
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit",
        hour12: false
      }).format(date);
    }

    function toLocalInputValue(date) {
      const offset = date.getTimezoneOffset() * 60000;
      return new Date(date.getTime() - offset).toISOString().slice(0, 16);
    }

    function safeJson(value) {
      return JSON.stringify(value)
        .replace(/&/g, "\\u0026")
        .replace(/</g, "\\u003c")
        .replace(/>/g, "\\u003e");
    }

    function setStatus(message, isError) {
      status.textContent = message;
      status.style.color = isError ? "#b00020" : "#52654b";
    }
  </script>


</body></html>
