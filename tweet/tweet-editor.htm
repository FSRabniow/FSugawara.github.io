<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>つぶやき入力</title>

  <style>
    * { box-sizing: border-box; }

    html { min-height: 100%; }

    body {
      min-height: 100vh;
      margin: 0;
      padding: 28px 14px;
      background: #f5ead8 url("paper-background.png") center / cover no-repeat fixed;
      color: #2f281f;
      font-family: "Times New Roman", "Yu Mincho", "MS Mincho", serif;
      line-height: 1.6;
    }

    main {
      width: min(760px, 100%);
      margin: 0 auto;
    }

    h1 {
      margin: 0 0 20px;
      font-size: 27px;
      letter-spacing: 0;
    }

    .editor {
      padding: 18px;
      border: 1px solid rgba(93, 81, 66, 0.55);
      background: rgba(255, 252, 244, 0.78);
    }

    label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
    }

    input[type="datetime-local"],
    textarea {
      width: 100%;
      margin-bottom: 14px;
      border: 1px solid #80715e;
      background: rgba(255, 255, 255, 0.82);
      color: #000;
      font: inherit;
    }

    input[type="datetime-local"] { padding: 7px; }

    textarea {
      min-height: 120px;
      padding: 9px;
      resize: vertical;
    }

    button,
    .file-label {
      display: inline-block;
      margin: 0 7px 7px 0;
      padding: 7px 12px;
      border: 1px solid #625542;
      border-radius: 3px;
      background: #eee2ce;
      color: #241e17;
      font: inherit;
      cursor: pointer;
    }

    button:hover,
    .file-label:hover { background: #e2d2b8; }

    .primary {
      background: #dce6d8;
      font-weight: bold;
    }

    .file-label input { display: none; }

    .status {
      min-height: 1.6em;
      margin: 8px 0 0;
      color: #52654b;
      font-size: 13px;
    }

    .draft-heading {
      margin: 26px 0 10px;
      font-size: 19px;
    }

    .draft {
      position: relative;
      padding: 12px 82px 12px 4px;
      border-top: 1px solid rgba(93, 81, 66, 0.38);
    }

    .draft:last-child {
      border-bottom: 1px solid rgba(93, 81, 66, 0.38);
    }

    .draft time {
      display: block;
      margin-bottom: 4px;
      color: #6a5b48;
      font-size: 12px;
    }

    .draft p {
      margin: 0;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .delete-button {
      position: absolute;
      top: 10px;
      right: 0;
      margin: 0;
      padding: 4px 9px;
      font-size: 13px;
    }

    .empty {
      color: #6a5b48;
      font-size: 14px;
    }

    @media (max-width: 560px) {
      body { padding: 18px 8px; }
      h1 { font-size: 23px; }
      .editor { padding: 13px; }
      button, .file-label { width: 100%; margin-right: 0; text-align: center; }
    }
  </style>
</head>

<body>
  <main>
    <h1>つぶやき入力</h1>

    <section class="editor">
      <label for="datetime">日時</label>
      <input id="datetime" type="datetime-local">

      <label for="tweet-text">本文</label>
      <textarea id="tweet-text" maxlength="1000"></textarea>

      <button class="primary" id="add-button" type="button">追加</button>
      <button id="download-button" type="button">公開用tweet.htmを作成</button>
      <label class="file-label">
        既存のtweet.htmを読み込む
        <input id="import-file" type="file" accept=".htm,.html,text/html">
      </label>

      <p class="status" id="status" aria-live="polite"></p>
    </section>

    <h2 class="draft-heading">登録済み</h2>
    <div id="draft-list"></div>
  </main>

  <script>
    const STORAGE_KEY = "fuga-tweets-v1";
    const datetimeInput = document.getElementById("datetime");
    const textInput = document.getElementById("tweet-text");
    const draftList = document.getElementById("draft-list");
    const status = document.getElementById("status");
    let tweets = [];

    initialize();

    document.getElementById("add-button").addEventListener("click", function () {
      const text = textInput.value.trim();
      if (!text) {
        setStatus("本文を入力してください。", true);
        return;
      }

      tweets.push({
        id: Date.now().toString(36) + Math.random().toString(36).slice(2, 7),
        datetime: datetimeInput.value || toLocalInputValue(new Date()),
        text: text
      });

      saveTweets();
      textInput.value = "";
      datetimeInput.value = toLocalInputValue(new Date());
      renderDrafts();
      setStatus("追加しました。公開用HTMを作成すると反映されます。");
    });

    document.getElementById("download-button").addEventListener("click", function () {
      const html = buildPublicHtml(tweets);
      const blob = new Blob([html], { type: "text/html;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = "tweet.htm";
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
      setStatus("tweet.htmを作成しました。GitHubのファイルと上書きしてください。");
    });

    document.getElementById("import-file").addEventListener("change", async function (event) {
      const file = event.target.files[0];
      if (!file) return;

      try {
        const html = await file.text();
        tweets = mergeTweets(parseTweetHtml(html), tweets);
        saveTweets();
        renderDrafts();
        setStatus("既存のつぶやきを読み込みました。");
      } catch (error) {
        setStatus("読み込めませんでした。生成済みのtweet.htmを選択してください。", true);
      }

      event.target.value = "";
    });

    async function initialize() {
      datetimeInput.value = toLocalInputValue(new Date());
      const localTweets = loadTweets();
      tweets = localTweets;

      if (location.protocol !== "file:") {
        try {
          const response = await fetch("tweet.htm?t=" + Date.now(), { cache: "no-store" });
          if (!response.ok) throw new Error("tweet.htmを取得できません");

          const publicTweets = parseTweetHtml(await response.text());
          tweets = mergeTweets(publicTweets, localTweets);
          saveTweets();
          setStatus("公開中のtweet.htmから" + publicTweets.length + "件を読み込みました。");
        } catch (error) {
          setStatus("公開中のtweet.htmは自動読込できませんでした。必要ならファイルを選択してください。", true);
        }
      }

      renderDrafts();
    }

    function renderDrafts() {
      draftList.innerHTML = "";

      if (tweets.length === 0) {
        draftList.innerHTML = '<p class="empty">まだ登録されていません。</p>';
        return;
      }

      tweets
        .slice()
        .sort(function (a, b) {
          return String(b.datetime).localeCompare(String(a.datetime));
        })
        .forEach(function (tweet) {
          const article = document.createElement("article");
          article.className = "draft";

          const time = document.createElement("time");
          time.textContent = formatDate(tweet.datetime);

          const text = document.createElement("p");
          text.textContent = tweet.text;

          const button = document.createElement("button");
          button.type = "button";
          button.className = "delete-button";
          button.textContent = "削除";
          button.addEventListener("click", function () {
            tweets = tweets.filter(function (item) { return item.id !== tweet.id; });
            saveTweets();
            renderDrafts();
            setStatus("削除しました。");
          });

          article.appendChild(time);
          article.appendChild(text);
          article.appendChild(button);
          draftList.appendChild(article);
        });
    }

    function loadTweets() {
      try {
        const stored = JSON.parse(localStorage.getItem(STORAGE_KEY));
        return Array.isArray(stored) ? stored : [];
      } catch (error) {
        return [];
      }
    }

    function saveTweets() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(tweets));
      } catch (error) {
        // file://など保存できない環境でも、現在開いている画面内では編集を続けられる。
      }
    }

    function parseTweetHtml(html) {
      const match = html.match(/<script id="tweet-data" type="application\/json">([\s\S]*?)<\/script>/);
      if (!match) throw new Error("tweet-dataがありません");

      const parsed = JSON.parse(match[1]);
      if (!Array.isArray(parsed)) throw new Error("データ形式が不正です");
      return parsed;
    }

    function mergeTweets(first, second) {
      const merged = new Map();

      first.concat(second).forEach(function (tweet, index) {
        if (!tweet || !tweet.text) return;
        const id = tweet.id || "import-" + String(tweet.datetime || "") + "-" + index;
        merged.set(id, {
          id: id,
          datetime: tweet.datetime || "",
          text: String(tweet.text)
        });
      });

      return Array.from(merged.values());
    }

    function setStatus(message, isError) {
      status.textContent = message;
      status.style.color = isError ? "#b00020" : "#52654b";
    }

    function toLocalInputValue(date) {
      const offset = date.getTimezoneOffset() * 60000;
      return new Date(date.getTime() - offset).toISOString().slice(0, 16);
    }

    function formatDate(value) {
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return value || "";

      return new Intl.DateTimeFormat("ja-JP", {
        year: "numeric", month: "2-digit", day: "2-digit",
        hour: "2-digit", minute: "2-digit", hour12: false
      }).format(date);
    }

    function safeJson(value) {
      return JSON.stringify(value)
        .replace(/&/g, "\\u0026")
        .replace(/</g, "\\u003c")
        .replace(/>/g, "\\u003e");
    }

    function buildPublicHtml(items) {
      const data = safeJson(items);
      return `<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>つぶやき | Fuga Sugawara</title>
<style>
*{box-sizing:border-box}html{min-height:100%}body{min-height:100vh;margin:0;padding:32px 16px;background:#f5ead8 url("paper-background.png") center/cover no-repeat fixed;color:#2f281f;font-family:"Times New Roman","Yu Mincho","MS Mincho",serif;font-size:16px;line-height:1.75}main{width:min(700px,100%);margin:0 auto}h1{margin:0 0 24px;font-size:28px;letter-spacing:0}.tweet{padding:14px 4px;border-bottom:1px solid rgba(93,81,66,.38)}.tweet:first-child{border-top:1px solid rgba(93,81,66,.38)}.tweet-time{margin:0 0 5px;color:#6a5b48;font-size:13px}.tweet-text{margin:0;white-space:pre-wrap;overflow-wrap:anywhere}.empty{color:#6a5b48}@media(max-width:560px){body{padding:20px 12px}h1{font-size:24px}.tweet{padding:12px 2px}}
</style>
</head>
<body>
<main><h1>つぶやき</h1><div id="tweet-list"></div></main>
<script id="tweet-data" type="application/json">${data}<\/script>
<script>
const d=document.getElementById("tweet-data"),l=document.getElementById("tweet-list");let t=[];try{t=JSON.parse(d.textContent)}catch(e){t=[]}if(!Array.isArray(t)||t.length===0){l.innerHTML='<p class="empty">まだつぶやきはありません。</p>'}else{t.slice().sort((a,b)=>String(b.datetime).localeCompare(String(a.datetime))).forEach(x=>{const a=document.createElement("article"),m=document.createElement("p"),p=document.createElement("p");a.className="tweet";m.className="tweet-time";p.className="tweet-text";const z=new Date(x.datetime);m.textContent=Number.isNaN(z.getTime())?(x.datetime||""):new Intl.DateTimeFormat("ja-JP",{year:"numeric",month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit",hour12:false}).format(z);p.textContent=x.text||"";a.append(m,p);l.appendChild(a)})}
<\/script>
</body>
</html>`;
    }
  </script>
</body>
</html>
